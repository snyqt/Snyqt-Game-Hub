{% extends 'base.html' %}

{% block title %}外链跳转提示{% endblock %}

{% block head %}
<style>
/* 安全跳转中间页样式 */
.safe-redirect-wrap {
    max-width: 560px;
    margin: 0 auto;
}

.safe-redirect-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
}

/* 警告图标 */
.safe-redirect-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(245, 179, 1, 0.12);
    border: 1px solid rgba(245, 179, 1, 0.35);
}

.safe-redirect-icon svg {
    width: 32px;
    height: 32px;
    color: var(--gold-strong);
}

/* 主标题 */
.safe-redirect-title {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
}

.safe-redirect-sub {
    font-size: .88rem;
    color: var(--muted);
    margin: 0 0 28px;
}

/* 目标域名展示 */
.safe-redirect-domain {
    font-size: .92rem;
    color: var(--text);
    margin-bottom: 12px;
}

.safe-redirect-domain strong {
    color: var(--gold-strong);
    font-weight: 700;
}

/* 完整 URL 代码块 */
.safe-redirect-url {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 0 0 32px;
    font-family: 'Courier New', Consolas, monospace;
    font-size: .8rem;
    color: var(--muted);
    word-break: break-all;
    text-align: left;
    line-height: 1.5;
}

/* 按钮组 */
.safe-redirect-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.safe-redirect-actions a,
.safe-redirect-actions button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: .92rem;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.25s ease;
}

.safe-redirect-actions .btn-continue {
    background: var(--primary);
    color: #07122A;
}

.safe-redirect-actions .btn-continue:hover {
    background: var(--primary-strong);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
}

.safe-redirect-actions .btn-back {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
}

.safe-redirect-actions .btn-back:hover {
    color: var(--text);
    border-color: var(--border-strong);
}

.safe-redirect-actions svg {
    width: 16px;
    height: 16px;
}
</style>
{% endblock %}

{% block content %}
<section class="page">
    <div class="container">
        <div class="safe-redirect-wrap">
            <div class="safe-redirect-card">
                {# 警告图标 #}
                <div class="safe-redirect-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>

                <h1 class="safe-redirect-title">您即将离开 SNYQT Game Hub</h1>
                <p class="safe-redirect-sub">请注意：外部链接的内容不由我们控制，继续访问需自行承担风险</p>

                {# 目标域名 #}
                <div class="safe-redirect-domain">目标网站: <strong>{{ domain }}</strong></div>

                {# 完整 URL 代码块 #}
                <div class="safe-redirect-url">{{ target_url }}</div>

                {# 操作按钮 #}
                <div class="safe-redirect-actions">
                    <a class="btn-continue" href="{{ target_url }}" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                        继续访问
                    </a>
                    <button class="btn-back" type="button" onclick="history.back()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        返回
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
