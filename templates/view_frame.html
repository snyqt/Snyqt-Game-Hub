<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ game.title }} · 在线游玩 - SNYQT Game Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #111640;
            border-bottom: 1px solid #1a1f5c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e676, #ffd740, transparent);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .game-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffd740;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #1a1f5c;
            border-radius: 6px;
            background: #111640;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: #00e676;
            background: #161b4d;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.2);
        }

        .btn-primary {
            background: rgba(0, 230, 118, 0.1);
            border-color: #00e676;
            color: #00e676;
        }

        .btn-primary:hover {
            background: rgba(0, 230, 118, 0.2);
            box-shadow: 0 0 16px rgba(0, 230, 118, 0.3);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* 游戏容器 */
        .game-container {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 32px;
            padding: 12px;
            background: #0a0e27;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: 2px solid #1a1f5c;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.15);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: all 0.3s ease;
        }

        /* 全屏状态 */
        body.fullscreen {
            overflow: hidden;
        }

        body.fullscreen .navbar {
            display: none;
        }

        body.fullscreen .game-container {
            top: 0;
            bottom: 0;
            padding: 0;
        }

        body.fullscreen .iframe-wrapper {
            border-radius: 0;
            border: none;
        }

        body.fullscreen .footer {
            display: none;
        }

        /* 底部提示栏 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: rgba(17, 22, 64, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid #1a1f5c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .footer .hub-name {
            color: #00e676;
            font-weight: 500;
        }

        .footer .divider {
            width: 1px;
            height: 12px;
            background: #1a1f5c;
        }

        .footer .game-name {
            color: #ffd740;
        }

        @media (max-width: 640px) {
            .game-title span {
                display: none;
            }
            .navbar {
                padding: 0 12px;
            }
            .btn-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="game-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 6V18C21 19.1 20.1 20 19 20H5C3.9 20 3 19.1 3 18V6C3 4.9 3.9 4 5 4H19C20.1 4 21 4.9 21 6ZM11 13V11H9V13H11ZM13 13H15V11H13V13ZM5 18H19V6H5V18Z" fill="currentColor"/>
            </svg>
            <span>{{ game.title }}</span>
        </div>
        <div class="btn-group">
            <a class="btn" href="{{ url_for('games.game_detail', gid=game.id) }}">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5m7-7l-7 7 7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="btn-text">返回详情</span>
            </a>
            <a class="btn" href="{{ url_for('community.new_post', tag=game.title, game_uid=game.game_uid|default(game.id, true), post_type='suggestion') }}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2l2.4 7.4H22l-6 4.4 2.3 7.4-6.3-4.6-6.3 4.6 2.3-7.4-6-4.4h7.6z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="btn-text">提交建议</span>
            </a>
            <button class="btn btn-primary" id="fullscreen-btn">
                <svg id="fullscreen-icon-open" viewBox="0 0 24 24">
                    <path d="M8 3H5C3.89 3 3 3.9 3 5v3m0 10v3c0 1.1.89 2 2 2h3m10-11h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-3m3 11v3c0 1.1-.9 2-2 2h-3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg id="fullscreen-icon-close" viewBox="0 0 24 24" style="display: none;">
                    <path d="M3 8h3V5c0-1.1.9-2 2-2h3m8 13h3v-3c0-1.1-.9-2-2-2h-3m-8 7h3V11H3v3c0 1.1.9 2 2 2zm10-12h-3V3h3c1.1 0 2 .9 2 2v3z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="btn-text" id="fullscreen-text">全屏</span>
            </button>
        </div>
    </nav>

    <div class="game-container">
        <div class="iframe-wrapper">
            <iframe id="game-frame" src="{{ iframe_src }}" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-presentation"></iframe>
        </div>
    </div>

    <footer class="footer">
        <span class="hub-name">SNYQT Game Hub</span>
        <span class="divider"></span>
        <span class="game-name">{{ game.title }}</span>
    </footer>

    <script>
        (function() {
            const btn = document.getElementById('fullscreen-btn');
            const iconOpen = document.getElementById('fullscreen-icon-open');
            const iconClose = document.getElementById('fullscreen-icon-close');
            const textSpan = document.getElementById('fullscreen-text');
            let isFullscreen = false;

            function updateUI() {
                if (isFullscreen) {
                    document.body.classList.add('fullscreen');
                    iconOpen.style.display = 'none';
                    iconClose.style.display = 'block';
                    textSpan.textContent = '退出';
                } else {
                    document.body.classList.remove('fullscreen');
                    iconOpen.style.display = 'block';
                    iconClose.style.display = 'none';
                    textSpan.textContent = '全屏';
                }
            }

            btn.addEventListener('click', function() {
                isFullscreen = !isFullscreen;
                updateUI();
            });

            // ESC 退出全屏
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isFullscreen) {
                    isFullscreen = false;
                    updateUI();
                }
            });
        })();
    </script>
</body>
</html>
