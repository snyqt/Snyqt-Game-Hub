{% extends 'base.html' %}

{% block title %}HTML 在线编辑器{% endblock %}

{% block head %}
<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<!-- CodeMirror JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<style>
.editor-page { padding: calc(var(--header-h) + 30px) 0 64px; }
.editor-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.CodeMirror { height: calc(100vh - 280px); border-radius:8px; font-size:14px; }
.editor-info { color: var(--muted); font-size: .85rem; }
</style>
{% endblock %}

{% block content %}
<section class="editor-page">
    <div class="container" style="max-width:1200px;">
        <div class="editor-toolbar">
            <h2 class="font-display" style="font-size:1.2rem;">HTML 在线编辑器</h2>
            <div class="flex gap-12 items-center">
                <span class="editor-info">编辑完成后点击上传</span>
                <button type="button" class="btn btn-primary" id="submit-html">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v12m0 0l4-4m-4 4l-4-4M5 21h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    上传代码
                </button>
            </div>
        </div>
        <textarea id="html-code-editor"></textarea>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const editor = CodeMirror.fromTextArea(document.getElementById('html-code-editor'), {
        mode: 'htmlmixed',
        theme: 'dracula',
        lineNumbers: true,
        lineWrapping: true,
        autoCloseTags: true,
        autoCloseBrackets: true,
        indentUnit: 4,
        tabSize: 4,
    });

    // 默认模板
    editor.setValue(`<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #00e676; font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Hello, SNYQT Game Hub!</h1>
    <script>
        // 在这里编写游戏逻辑
    <\/script>
</body>
</html>`);

    // 上传按钮：发送内容到父窗口
    document.getElementById('submit-html').addEventListener('click', () => {
        const content = editor.getValue();
        if (window.opener) {
            window.opener.postMessage({
                type: 'html-content',
                content: content
            }, '*');
            window.close();
        } else {
            alert('无法发送到父窗口，请从开发者面板打开此页面');
        }
    });
});
</script>
{% endblock %}
