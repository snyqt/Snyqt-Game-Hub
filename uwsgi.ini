; SNYQT Game Hub uWSGI 配置
; 适配 500MB 大文件上传：post-buffering=0 + limit-post=512MB + 600s 超时
;
; 启动：uwsgi --ini uwsgi.ini
; Docker 内由 CMD 直接调用：uwsgi --ini uwsgi.ini

[uwsgi]
; ==================== 应用加载 ====================
; 通过 wsgi.py 暴露的 app 变量加载 Flask 应用
module = wsgi:app

; 每个进程独立加载应用，避免 fork 共享状态问题
lazy-apps = true

; ==================== 监听方式（IPv4 + IPv6 双栈） ====================
; 关键：使用 http-socket 而非 http
; http 模式会启动内置 HTTP 路由器进程，该路由器默认缓冲整个请求体后再转发给 worker，
; 导致大文件上传时 Cloudflare HTTP/2 流控超时（ERR_HTTP2_PROTOCOL_ERROR）
; http-socket 让 worker 直接处理 HTTP 请求，配合 post-buffering=0 实现真正的流式上传
;
; 双栈监听：http-socket = [::]:80
; [::] 是 IPv6 通配地址。Linux 默认 net.ipv6.bindv6only=0，
; 因此 [::]:80 会同时接受 IPv4 和 IPv6 连接（IPv4 连接会以 ::ffff:IPv4 的映射形式呈现）。
; 注意：uWSGI 2.0.x 不存在 http6-socket 选项，使用 [::]:80 即可实现双栈。
;
; 生产环境若用 Nginx 反代，改用 socket 协议：
;   - socket  = 127.0.0.1:80      仅 IPv4 UNIX-like 域协议
;   - socket6 = [::1]:80          仅 IPv6
; 同时在 Nginx 的 listen 指令上加 ipv6only=on/off 控制客户端协议。
;
; macvlan 部署模式：容器直接获取公网 IPv6，无需端口映射（-p），
; 外网通过容器公网 IPv6 + 80 端口直接访问。
http-socket = [::]:80

; ==================== 进程与线程 ====================
; 4 进程 × 2 线程 = 8 个并发处理单元
processes = 4
threads = 2

; ==================== 大文件上传关键配置 ====================
; 关闭 post-buffering，让请求体以流式方式直接传递给 Flask
; 否则 uWSGI 会先把整个请求体缓存到磁盘/内存，导致大文件上传卡死
post-buffering = 0

; 允许的最大请求体大小：512MB（与 Flask MAX_CONTENT_LENGTH 对齐）
limit-post = 536870912

; 请求头缓冲区大小（64KB），适配大 header 场景
buffer-size = 65535

; ==================== 超时配置 ====================
; 单请求最大执行时间 600s，适配慢速上传
harakiri = 600

; socket 读写超时 600s
socket-timeout = 600

; 重启时等待旧请求结束的最长时间
reload-mercy = 600

; ==================== 稳定性 ====================
; 每个 worker 处理 5000 个请求后自动回收，缓解内存泄漏
max-requests = 5000

; max-requests 抖动范围，避免所有 worker 同时重启
max-requests-delta = 1000

; ==================== 日志 ====================
; Docker 部署时日志输出到 stdout/stderr，便于 docker logs 查看
; 本地裸机部署可取消下面两行注释，写入文件
; daemonize = /app/logs/uwsgi.log
; logto = /app/logs/uwsgi.log

; ==================== 降权运行（生产推荐） ====================
; Docker 容器内通常已是非 root 用户，可按需启用
; uid = www-data
; gid = www-data

; ==================== 其他 ====================
; 禁用 uWSGI 内置的请求日志写入（减少噪音），如需调试可设为 true
disable-logging = false

; 退出时自动清理 socket 文件
vacuum = true

; 主进程模式，便于平滑重启
master = true

; 平滑重启命令：uwsgi --reload /tmp/uwsgi.pid
pidfile = /tmp/uwsgi.pid
